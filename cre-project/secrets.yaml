# Standard CRE Format for Secrets Management
# Complies with patterns seen in cre-templates and 2026 Documentation.

# Declaration of Logical Names (Used in VaultDonSecrets and {{.SEC}})
secrets:
  - id: "SENIAT_API_KEY"
  - id: "AML_API_KEY"
  - id: "AI_API_KEY"
  - id: "CHECKCRYPTO_API_KEY"
  - id: "GEMINI_API_KEY"
  - id: "BANK_API_KEY"

# Optional mapping for backward compatibility with old templates
secretsNames:
  CHECKCRYPTO_API_KEY:
    - CHECKCRYPTO_API_KEY
  GEMINI_API_KEY:
    - GEMINI_API_KEY
  BANK_API_KEY:
    - BANK_API_KEY
  SENIAT_API_KEY:
    - SENIAT_API_KEY
  AML_API_KEY:
    - AML_API_KEY
  AI_API_KEY:
    - AI_API_KEY
